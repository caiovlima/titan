<button
  [type]="type()"
  [disabled]="disabled() || loading()"
  [class]="classes()"
  [attr.aria-busy]="loading()"
  (click)="onPress($event)"
>
  @if (loading()) {
    <span
      class="size-4 animate-spin rounded-full border-2 border-current border-t-transparent"
      aria-hidden="true"
    ></span>
  }
  <ng-content />
</button>
